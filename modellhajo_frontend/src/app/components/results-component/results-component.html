<top-bar-root></top-bar-root>
<section class="content">
    <div class="col-12 g-0 px-5 py-2">
        <label for="compSelect" class="form-label"><h3>Válasszon versenyt</h3></label>
        <select id="compSelect" class="form-select" (change)="onSelectChange($event)">
            <option value="">-- Válasszon --</option>
            <option *ngFor="let comp of competitions" [value]="comp.id">{{comp.nev}}</option>
        </select>
        @if (selectedCompetition) {
            <div class="pt-3">
                <h3>{{selectedCompetition.nev}} - Eredmény felvétele</h3>
                <!-- kategoria valaszto -->
                 <!-- futamok?? -->
            </div>
        }
    </div>
    
</section>
